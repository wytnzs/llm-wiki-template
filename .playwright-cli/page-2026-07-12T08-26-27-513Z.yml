  - heading "02 真正的客户管理，最小单位不是客户，而是事件" [level=2] [ref=e41]
  - paragraph [ref=e42]: 客户档案有一个问题：它太容易被写成静态简历。
  - paragraph [ref=e43]: 客户是谁，住哪儿，做什么，家庭情况如何，买过什么产品。这些都重要，但不够。
  - paragraph [ref=e44]: 因为客户是动态变化的。一次聊天、一段录音、一份体检报告、一次理赔沟通、一个顾虑、一个转介绍来源，都可能改变你对这个客户的判断。
  - paragraph [ref=e45]:
    - strong [ref=e46]: 最小单位不是“客户”，而是“客户信息事件”。
  - paragraph [ref=e47]: 事件回答的是：发生了什么。洞察回答的是：这意味着什么。跟进回答的是：下一步做什么。
