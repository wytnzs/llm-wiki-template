  - generic [ref=e3]: CUSTOMER SYSTEM · 深度编辑风
  - heading "别再用表格管客户了，真正值钱的是下一步动作" [level=1] [ref=e4]
  - generic [ref=e5]: 很多人做客户管理，第一反应是建个表。姓名、电话、城市、需求、备注。看起来很完整，但过一段时间你会发现：客户都在表里，你还是不知道这周该跟谁聊、该聊什么、谁值得推进。
  - generic [ref=e6]:
    - generic [ref=e7]: 本文看点
    - paragraph [ref=e8]: 01 · 为什么客户不是一行数据，而是一条持续变化的线索
    - paragraph [ref=e9]: 02 · 为什么真正的客户管理，最小单位应该是信息事件
    - paragraph [ref=e10]: 03 · 为什么先识别缺口，再生成方案，才是专业底线
  - img "客户管理库中心解释图" [ref=e12]
  - paragraph [ref=e13]: 客户信息进入系统后，经过身份匹配、洞察缺口、方案建议，最后落到跟进动作。
  - heading "01 客户不是一行数据，而是一条持续变化的线索" [level=2] [ref=e14]
  - paragraph [ref=e15]: 传统表格最容易犯的错，是把客户压缩成一行。
  - paragraph [ref=e16]: 张先生，杭州，已婚一孩，想了解重疾险，体检有甲状腺结节。
  - paragraph [ref=e17]: 这当然有用。但真正有价值的，不只是这句话本身，而是这句话背后暴露出的经营信号。
  - list [ref=e18]:
    - listitem [ref=e19]: 他有家庭责任。
    - listitem [ref=e20]: 他主动咨询重疾险。
    - listitem [ref=e21]: 他有健康异常。
    - listitem [ref=e22]: 他可能需要核保前置。
    - listitem [ref=e23]: 他不适合被直接推方案。
  - paragraph [ref=e24]: 同一条信息，放在表格里只是备注；放进客户管理库里，就变成了一串动作。
  - paragraph [ref=e25]: 客户资料的价值，不在“记住了什么”，而在“它能不能推动下一步”。
