        - cell "出险时间、治疗记录、保险合同" [ref=e94]
      - row [ref=e95]:
        - cell "客户沟通" [ref=e96]
        - cell "真实顾虑、决策人、时间节点" [ref=e97]
  - paragraph [ref=e98]: 专业不是“马上给答案”。专业是知道什么时候不能急着给答案。
  - generic [ref=e99]:
    - generic [ref=e100]: ILLUSTRATION 03
    - generic [ref=e101]: 方案前置之前，先问四个缺口
    - generic [ref=e102]:
      - generic [ref=e103]:
        - text: 客户是谁
        - paragraph [ref=e104]: 身份、家庭责任、决策人是否清楚？
      - generic [ref=e105]:
        - text: 已有多少
        - paragraph [ref=e106]: 保单、预算、已有服务是否清楚？
      - generic [ref=e107]:
        - text: 风险在哪
        - paragraph [ref=e108]: 健康、理赔、法律边界是否清楚？
      - generic [ref=e109]:
        - text: 下一步是啥
        - paragraph [ref=e110]: 补资料、复核、沟通还是暂缓？
  - heading "05 客户经营不是靠记忆，是靠看板" [level=2] [ref=e111]
  - paragraph [ref=e112]: 一个人客户少的时候，可以靠脑子记。但客户一多，脑子就会骗人。
  - paragraph [ref=e113]: 你以为你记得谁该跟进，其实你只记得最近和你聊过的人。你以为你知道谁最重要，其实你只是被最吵的人牵着走。
  - paragraph [ref=e114]: 本周经营看板回答的是：这周最值得跟进谁？哪些客户缺下一步动作？哪些客户信息不足但值得推进？哪些客户可以进入方案复核？
  - generic [ref=e115]:
    - generic [ref=e116]: ILLUSTRATION 04
    - generic [ref=e117]: 本周客户经营看板
    - generic [ref=e118]:
      - generic [ref=e119]:
