  - heading "03 为什么普通 CRM 不够用" [level=2] [ref=e73]
  - paragraph [ref=e74]: 不是说 CRM 没用。CRM 很适合管理销售阶段、商机金额、成交概率、负责人和流程节点。
  - paragraph [ref=e75]: 但对很多保险代理人、咨询顾问、知识服务者来说，客户关系不是标准流水线。
  - paragraph [ref=e76]: 一个客户可能今天只是问医保，三个月后才聊重疾险；一个客户可能先是内容读者，后来变成咨询客户；一个客户可能暂时不成交，但长期有转介绍价值。
  - paragraph [ref=e77]: 这类客户，不是简单放进“意向客户 / 成交客户 / 流失客户”就能解决的。
  - heading "04 先识别缺口，再生成方案" [level=2] [ref=e78]
  - paragraph [ref=e79]: 很多销售动作之所以让客户反感，不是因为你不专业，而是因为你太急着给方案。
  - paragraph [ref=e80]: 信息还没够，就开始推荐。健康情况没问清，就开始讲产品。客户顾虑没识别，就开始输出优点。
