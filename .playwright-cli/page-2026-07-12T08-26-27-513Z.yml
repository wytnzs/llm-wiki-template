        - generic [ref=e130]: 暂不成交 + 有关系价值
  - heading "06 AI 不是替你做判断，而是帮你固定流程" [level=2] [ref=e131]
  - generic [ref=e132]: 入口判断 → 身份匹配 → 事件入库 → 档案更新 → 客户洞察 → 信息缺口 → 产品匹配 → 专属方案 → 跟进复盘
  - paragraph [ref=e133]: AI 在这里不是神仙。它更像一个永远不嫌麻烦的助理，帮你按流程做那些容易被忽略、但长期最值钱的事。
  - paragraph [ref=e134]: 尤其是涉及健康、保险、理赔、法律、财务承诺时，它不能替你下结论，反而应该提醒你保守表达、人工复核。
  - heading "07 最后，客户管理库真正沉淀的不是资料" [level=2] [ref=e135]
  - paragraph [ref=e136]: 真正沉淀的是三样东西：你对客户的理解，你服务客户的判断路径，你长期经营客户的动作记录。
  - paragraph [ref=e137]: 资料只是原材料。洞察、缺口、方案、跟进、复盘，才是资产。
  - paragraph [ref=e138]:
    - strong [ref=e139]: 先接住信息，再判断价值。先匹配身份，再沉淀档案。先识别缺口，再生成方案。先人工复核，再对外沟通。
