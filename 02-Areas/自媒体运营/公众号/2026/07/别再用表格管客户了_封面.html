<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>封面</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#E5E7EB;gap:20px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.btn-download{background:#1A1A2E;color:#FFF;border:none;padding:10px 28px;font-size:14px;border-radius:4px;cursor:pointer}
.btn-download:hover{background:#C53030}
.combo{display:flex}
.left{width:900px;height:383px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:48px 64px;border-right:1px solid rgba(255,255,255,0.06);
background:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(135deg,#1A1A2E 0%,#2A1A1A 50%,#3A1A1A 100%);
background-size:32px 32px,32px 32px,100% 100%;
}
.left::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#C53030 0%,transparent 100%);opacity:0.7}
.tag-row{display:flex;gap:8px;margin-bottom:18px;position:relative;z-index:2}
.tag{padding:4px 14px;background:rgba(197,48,48,0.12);border-radius:3px;font-size:11px;color:#C53030;font-weight:600;letter-spacing:1.5px;font-family:'Noto Sans SC',sans-serif}
.main-title{font-size:52px;font-weight:800;color:#FFFFFF;line-height:1.15;position:relative;z-index:2;letter-spacing:-1.5px;text-shadow:0 2px 12px rgba(0,0,0,0.25)}
.sub-row{margin-top:14px;position:relative;z-index:2}
.subtitle{font-size:17px;color:rgba(255,255,255,0.70);font-weight:400;letter-spacing:0.3px}
.info-line{position:absolute;bottom:32px;left:64px;font-size:11px;color:rgba(255,255,255,0.30);letter-spacing:1px;z-index:2}
.right{width:383px;height:383px;position:relative;overflow:hidden;display:flex;justify-content:center;align-items:center;padding:36px;
background:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(135deg,#1A1A2E 0%,#2A1A1A 100%);
background-size:32px 32px,32px 32px,100% 100%;
}
.right .title{font-size:36px;font-weight:700;color:#FFFFFF;text-align:center;line-height:1.2;position:relative;z-index:2;text-shadow:0 2px 8px rgba(0,0,0,0.2);letter-spacing:-1px}
</style></head><body>
<button class="btn-download" onclick="downloadCover()">⬇ 下载封面 PNG</button>
<div class="combo">
  <div class="left">
    <div class="tag-row"><span class="tag">方法论</span><span class="tag">客户经营</span></div>
    <div class="main-title">别再用表格<br>管客户了</div>
    <div class="sub-row"><span class="subtitle">真正值钱的是下一步动作</span></div>
    <div class="info-line">王永涛 · 保险其实不难</div>
  </div>
  <div class="right">
    <div class="title">别再用<br>表格<br>管客户了</div>
  </div>
</div>
<script>
function downloadCover(){var el=document.querySelector('.combo');html2canvas(el,{scale:2,backgroundColor:null,useCORS:true,logging:false}).then(function(c){var a=document.createElement('a');a.download='封面_别再用表格管客户了.png';a.href=c.toDataURL('image/png');a.click();}).catch(function(e){console.error(e);})}
</script>
</body></html>
