<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面 - swiss-ikb 克莱因蓝</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #d5d8de; gap: 20px; }
  .combo { display: flex; }
  .btn-download { background: #002FA7; color: #FFF; border: none; padding: 10px 28px; font-size: 15px; border-radius: 0; cursor: pointer; font-family: "Inter", "Noto Sans SC", sans-serif; }
  .btn-download:hover { opacity: 0.85; }

  /* ===== 左侧 21:9 ===== */
  .left {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    background: #fafaf8;
    display: flex; flex-direction: column; justify-content: center;
    padding: 48px 64px;
    border-right: 1px solid #e0e0dc;
  }
  /* 强调色块 - 左上角 */
  .swiss-block {
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 6px;
    background: #002FA7;
  }
  /* 发丝线 */
  .hairline {
    position: absolute;
    bottom: 80px; left: 64px; right: 64px;
    height: 1px;
    background: #002FA7;
    opacity: 0.15;
  }
  .tag-row { display: flex; gap: 10px; margin-bottom: 24px; position: relative; z-index: 2; }
  .tag {
    padding: 4px 14px;
    background: #002FA7;
    color: #FFFFFF;
    font-size: 12px; letter-spacing: 1.5px;
    font-family: "IBM Plex Mono", monospace;
    font-weight: 500;
    text-transform: uppercase;
  }
  .main-title {
    font-size: 82px; font-weight: 300; color: #0a0a0a;
    line-height: 1.05; letter-spacing: -.015em;
    position: relative; z-index: 2;
    font-family: "Inter", "Noto Sans SC", sans-serif;
  }
  .sub-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; position: relative; z-index: 2; }
  .sub-line {
    width: 40px;
    height: 3px;
    background: #002FA7;
    flex-shrink: 0;
  }
  .subtitle {
    font-size: 20px; color: #737373;
    letter-spacing: .08em; font-weight: 400;
    font-family: "IBM Plex Mono", monospace;
    text-transform: uppercase;
  }
  .info-line {
    position: absolute; bottom: 50px; left: 64px;
    font-size: 12px; color: #737373;
    letter-spacing: .12em; z-index: 2;
    font-family: "IBM Plex Mono", monospace;
    text-transform: uppercase;
  }
  /* 右下装饰：点阵 */
  .dot-grid {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 72px; height: 72px;
    background-image: radial-gradient(#002FA7 1.2px, transparent 1.2px);
    background-size: 12px 12px;
    opacity: 0.10;
    z-index: 1;
  }
  /* 强调竖条 */
  .bar-vert {
    position: absolute;
    right: 48px; top: 48px;
    width: 3px; height: 60px;
    background: #002FA7;
    opacity: 0.15;
  }

  /* ===== 右侧 1:1 ===== */
  .right {
    width: 383px; height: 383px; position: relative; overflow: hidden;
    background: #fafaf8;
    display: flex; justify-content: center; align-items: center;
    padding: 36px;
  }
  .right::before {
    content: ''; position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    border: 1px solid #002FA7;
    opacity: 0.06;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .right .title {
    font-size: 52px; font-weight: 300; color: #0a0a0a;
    text-align: center; line-height: 1.08;
    position: relative; z-index: 2;
    letter-spacing: -.01em;
    font-family: "Inter", "Noto Sans SC", sans-serif;
  }
  /* 方块装饰 */
  .dot-sq {
    position: absolute;
    bottom: 32px; right: 32px;
    width: 40px; height: 40px;
    background: #002FA7;
    opacity: 0.06;
  }
  .dot-sq2 {
    position: absolute;
    top: 32px; left: 32px;
    width: 20px; height: 20px;
    border: 2px solid #002FA7;
    opacity: 0.08;
  }
</style>
</head>
<body>
  <button class="btn-download" onclick="downloadCover()">⬇ 下载封面</button>
  <div class="combo">
    <div class="left">
      <div class="swiss-block"></div>
      <div class="hairline"></div>
      <div class="dot-grid"></div>
      <div class="bar-vert"></div>
      <div class="tag-row">
        <span class="tag">分红险</span>
        <span class="tag">监管</span>
      </div>
      <div class="main-title">630倒计时<br>20天</div>
      <div class="sub-row">
        <div class="sub-line"></div>
        <span class="subtitle">演示利率全面下调至3.5%</span>
      </div>
      <div class="info-line">银保关注 · 2026.06</div>
    </div>
    <div class="right">
      <div class="dot-sq"></div>
      <div class="dot-sq2"></div>
      <div class="title">630<br>倒计时<br>20天</div>
    </div>
  </div>
  <p style="margin-top:16px;font-size:13px;color:#737373;font-family:'IBM Plex Mono',monospace;">
    swiss-ikb · 克莱因蓝 · 适合科技/数据/专业内容
  </p>
  <script>
    function downloadCover() {
      var el = document.querySelector('.combo');
      html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false })
        .then(function(c) { var l = document.createElement('a'); l.download = '封面_swiss-ikb.png'; l.href = c.toDataURL('image/png'); l.click(); });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
