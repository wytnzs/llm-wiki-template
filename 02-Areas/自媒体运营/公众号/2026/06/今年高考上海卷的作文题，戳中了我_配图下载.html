<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #E8ECF1; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; padding: 32px 16px 60px; }
.header { max-width: 677px; margin: 0 auto 28px; text-align: center; }
.header h1 { font-size: 20px; font-weight: 800; color: #102542; margin-bottom: 6px; }
.header p { font-size: 14px; color: #86909C; }
.illu-card { position: relative; width: 100%; max-width: 677px; margin: 24px auto; border-radius: 12px; overflow: hidden; box-sizing: border-box; }
.illu-download-btn { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(255,255,255,0.9); border: 1px solid #CBD5E0; border-radius: 6px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: #4A5568; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.4; font-weight: 600; }

<body>

      <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:8px;">
        <span style="width:18px; height:18px; border-radius:50%; background:#E5EAF2; color:#86909C; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">1</span>

      <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:8px;">

        <span style="font-size:13px; color:#4A4A4A; line-height:1.6;">上限就是你体力能覆盖的范围</span>
      </div>

        <span style="width:18px; height:18px; border-radius:50%; background:#E5EAF2; color:#86909C; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">3</span>

      <div style="font-size:16px; font-weight:700; color:#F77F00; padding-bottom:8px; border-bottom:2px solid #F77F00; margin-bottom:12px;">AI打开的世界</div>
      <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:8px;">
        <span style="width:18px; height:18px; border-radius:50%; background:rgba(247,127,0,0.15); color:#F77F00; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">✓</span>

</div>

<p style="text-align:center; max-width:677px; margin:32px auto 0; font-size:13px; color:#86909C;">
  打开预览 HTML 确认位置，在本页下载 PNG → 上传到公众号图片库 → 回到预览页全选复制正文粘贴
</p>

<script>
function downloadCard(elementId, filename) {
  var el = document.getElementById(elementId);
  if (!el) return;
  var btn = el.querySelector('.illu-download-btn');
  if (btn) btn.style.display = 'none';
  html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false })
    .then(function(canvas) {
      var link = document.createElement('a');
      link.download = (filename || '配图') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      if (btn) btn.style.display = '';
    })
    .catch(function(err) { console.error('html2canvas error:', err); if (btn) btn.style.display = ''; });
}
</script>

</body>
</html>
