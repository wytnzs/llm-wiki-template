<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面 - 杂志大数字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:ital@0;1&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #d5d8de; gap: 20px; }
  .combo { display: flex; }
  .btn-download { background: #0a1f3d; color: #FFF; border: none; padding: 10px 28px; border-radius: 0; cursor: pointer; font-size: 14px; font-family: "IBM Plex Mono", monospace; }
  .btn-download:hover { background: #315d93; }

  .left {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    background: #f2f4f5;
    display: flex; flex-direction: column; justify-content: center;
    padding: 48px 64px;
    border-right: 1px solid #e5ebef;
  }
  /* 超大背景数字 */
  .bg-number {
    position: absolute;
    right: 20px; top: -20px;
    font-family: "Playfair Display", "Noto Serif SC", serif;
    font-size: 320px;
    font-weight: 400;
    font-style: italic;
    color: rgba(10,31,61,0.04);
    line-height: 1;
    z-index: 1;
    user-select: none;
    pointer-events: none;
  }
  .bg-number2 {
    position: absolute;
    left: -30px; bottom: -40px;
    font-family: "Playfair Display", "Noto Serif SC", serif;
    font-size: 200px;
    font-weight: 400;
    color: rgba(49,93,147,0.03);
    line-height: 1;
    z-index: 1;
    user-select: none;
    pointer-events: none;
  }
  /* 装饰线 - 杂志风格 */
  .mag-rule {
    position: absolute;
    top: 32px; left: 64px; right: 64px;
    height: 1px;
    background: #e5ebef;
    z-index: 1;
  }
  .mag-rule-bottom {
    position: absolute;
    bottom: 60px; left: 64px; right: 64px;
    height: 2px;
    background: #315d93;
    opacity: 0.08;
    z-index: 1;
  }
  /* 小圆点分隔 */
  .issue-tag {
    position: absolute;
    top: 44px; left: 64px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: #5f6d78;
    letter-spacing: .15em;
    text-transform: uppercase;
    z-index: 2;
  }
  .tag-row { display: flex; gap: 8px; margin: 28px 0 16px; position: relative; z-index: 2; }
  .tag {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #315d93;
    background: rgba(49,93,147,0.06);
    padding: 3px 12px;
  }
  .main-title {
    font-size: 72px; font-weight: 500; color: #0a1f3d;
    line-height: 1.06;
    position: relative; z-index: 2;
    font-family: "Noto Serif SC", "Songti SC", serif;
    letter-spacing: .03em;
  }
  .sub-row { margin-top: 12px; position: relative; z-index: 2; }
  .subtitle {
    font-size: 20px; color: #5f6d78;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-style: italic;
  }
  .info-line {
    position: absolute; bottom: 32px; left: 64px;
    font-size: 11px; color: #5f6d78;
    letter-spacing: .12em; z-index: 2;
    font-family: "IBM Plex Mono", monospace;
  }

  .right {
    width: 383px; height: 383px; position: relative; overflow: hidden;
    background: #f2f4f5;
    display: flex; justify-content: center; align-items: center;
    padding: 36px;
  }
  .right .bg-number-r {
    position: absolute;
    right: -10px; top: -15px;
    font-family: "Playfair Display", serif;
    font-size: 280px;
    font-weight: 400;
    font-style: italic;
    color: rgba(10,31,61,0.04);
    line-height: 1;
    z-index: 1;
  }
  .right .title {
    font-size: 48px; font-weight: 500; color: #0a1f3d;
    text-align: center; line-height: 1.15;
    position: relative; z-index: 2;
    font-family: "Noto Serif SC", "Songti SC", serif;
    letter-spacing: .03em;
  }
  .right .mag-dot {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #315d93;
    opacity: 0.08;
  }
</style>
</head>
<body>
  <button class="btn-download" onclick="downloadCover()">⬇ 下载</button>
  <div class="combo">
    <div class="left">
      <div class="bg-number">630</div>
      <div class="bg-number2">20</div>
      <div class="mag-rule"></div>
      <div class="mag-rule-bottom"></div>
      <div class="issue-tag">Vol.01 · 2026.06</div>
      <div class="tag-row">
        <span class="tag">分红险</span>
        <span class="tag">监管</span>
      </div>
      <div class="main-title">630倒计时<br>20天</div>
      <div class="sub-row">
        <span class="subtitle">演示利率全面下调至3.5%</span>
      </div>
      <div class="info-line">银保关注</div>
    </div>
    <div class="right">
      <div class="bg-number-r">63</div>
      <div class="mag-dot"></div>
      <div class="title">630<br>倒计时<br>20天</div>
    </div>
  </div>
  <p style="margin-top:16px;font-size:12px;color:#5f6d78;font-family:'IBM Plex Mono',monospace;">
    装饰：杂志大数字 / 双分割线 / 斜体副标题 · 亮底
  </p>
  <script>
    function downloadCover() {
      var el = document.querySelector('.combo');
      html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false })
        .then(function(c) { var l = document.createElement('a'); l.download = '封面_杂志大数字.png'; l.href = c.toDataURL('image/png'); l.click(); });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
