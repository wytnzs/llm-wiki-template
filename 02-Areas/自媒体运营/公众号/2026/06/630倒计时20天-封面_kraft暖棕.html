<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面 - editorial-kraft 暖棕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #d5d8de; gap: 20px; }
  .combo { display: flex; }
  .btn-download { background: #2a1e13; color: #FFF; border: none; padding: 10px 28px; font-size: 15px; border-radius: 6px; cursor: pointer; font-family: "Noto Sans SC", -apple-system, "PingFang SC", sans-serif; }
  .btn-download:hover { background: #9b5a2e; }

  .left {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    background:
      radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(ellipse 550px 400px at 85% 20%, rgba(155,90,46,0.10) 0%, transparent 100%),
      radial-gradient(ellipse 350px 280px at 15% 80%, rgba(42,30,19,0.20) 0%, transparent 100%),
      radial-gradient(ellipse 200px 150px at 70% 85%, rgba(155,90,46,0.06) 0%, transparent 100%),
      linear-gradient(155deg, #1e150e 0%, #2a1e13 35%, #362b21 70%);
    background-size: 24px 24px, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
    display: flex; flex-direction: column; justify-content: center;
    padding: 48px 64px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .left::before {
    content: ''; position: absolute;
    width: 420px; height: 420px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.08);
    top: -200px; right: -140px;
  }
  .left::after {
    content: ''; position: absolute;
    width: 280px; height: 280px; border-radius: 50%;
    border: 2px solid rgba(155,90,46,0.18);
    top: 65px; right: 80px;
  }
  .dots {
    position: absolute; top: 0; left: 0;
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(155,90,46,0.7);
    box-shadow:
      278px 200px 0 rgba(255,255,255,0.28),
      780px 130px 0 rgba(155,90,46,0.45),
      740px 210px 0 rgba(255,255,255,0.18),
      700px 170px 0 rgba(155,90,46,0.28),
      560px 290px 0 rgba(255,255,255,0.12),
      660px 80px  0 rgba(155,90,46,0.22),
      830px 250px 0 rgba(255,255,255,0.10),
      140px 300px 0 rgba(255,255,255,0.08),
      320px 330px 0 rgba(155,90,46,0.16),
      460px 320px 0 rgba(255,255,255,0.06),
      810px 340px 0 rgba(155,90,46,0.12);
  }
  .line-diag {
    position: absolute; width: 120px; height: 1px;
    background: #9b5a2e;
    top: 110px; right: 190px; opacity: 0.25;
    transform: rotate(-28deg);
  }
  .line-h {
    position: absolute; bottom: 100px; left: 56px; right: 56px;
    height: 1px;
    background: linear-gradient(90deg, #9b5a2e, rgba(155,90,46,0.08) 50%, transparent 80%);
  }
  .tag-row { display: flex; gap: 12px; margin-bottom: 22px; position: relative; z-index: 2; }
  .tag {
    padding: 6px 20px; border: 1px solid rgba(155,90,46,0.40);
    border-radius: 20px; background: rgba(155,90,46,0.10);
    color: rgba(255,255,255,0.90); font-size: 15px; letter-spacing: 1.5px;
    font-family: "IBM Plex Mono", monospace;
  }
  .main-title {
    font-size: 82px; font-weight: 500; color: #FFF;
    line-height: 1.10; letter-spacing: 3px;
    position: relative; z-index: 2;
    text-shadow: 0 0 80px rgba(155,90,46,0.10), 0 2px 4px rgba(0,0,0,0.3);
    font-family: "Noto Serif SC", "Songti SC", serif;
  }
  .sub-row { display: flex; align-items: center; gap: 14px; margin-top: 16px; position: relative; z-index: 2; }
  .sub-dot { width: 10px; height: 10px; border-radius: 50%; background: #9b5a2e; flex-shrink: 0; box-shadow: 0 0 8px rgba(155,90,46,0.5); }
  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.50);
    letter-spacing: 2px; font-weight: 400;
    font-family: "IBM Plex Mono", monospace;
  }
  .info-line {
    position: absolute; bottom: 40px; left: 64px;
    font-size: 13px; color: rgba(255,255,255,0.22);
    letter-spacing: 1px; z-index: 2;
    font-family: "IBM Plex Mono", monospace;
  }
  .right {
    width: 383px; height: 383px; position: relative; overflow: hidden;
    background:
      radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(ellipse 280px 280px at 60% 65%, rgba(155,90,46,0.08) 0%, transparent 100%),
      radial-gradient(ellipse 200px 200px at 35% 25%, rgba(42,30,19,0.15) 0%, transparent 100%),
      linear-gradient(155deg, #1e150e 0%, #2a1e13 50%, #362b21 100%);
    background-size: 24px 24px, 100% 100%, 100% 100%, 100% 100%;
    display: flex; justify-content: center; align-items: center;
    padding: 36px;
  }
  .right::before {
    content: ''; position: absolute;
    width: 340px; height: 340px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.08);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .right::after {
    content: ''; position: absolute;
    width: 220px; height: 220px; border-radius: 50%;
    border: 2px solid rgba(155,90,46,0.16);
    bottom: -80px; right: -70px;
  }
  .corner-accent {
    position: absolute; top: 32px; right: 32px;
    width: 28px; height: 28px;
    border-top: 2px solid #9b5a2e;
    border-right: 2px solid #9b5a2e;
    opacity: 0.35;
  }
  .dots-r {
    position: absolute; top: 0; left: 0;
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(155,90,46,0.6);
    box-shadow:
      140px 105px 0 rgba(255,255,255,0.18),
      300px 240px 0 rgba(155,90,46,0.30),
      40px 320px 0 rgba(255,255,255,0.08),
      260px 50px 0 rgba(155,90,46,0.18),
      340px 150px 0 rgba(155,90,46,0.12),
      80px 55px 0 rgba(255,255,255,0.05);
  }
  .right .title {
    font-size: 50px; font-weight: 500; color: #FFF;
    text-align: center; line-height: 1.20;
    position: relative; z-index: 2; letter-spacing: 3px;
    text-shadow: 0 0 60px rgba(155,90,46,0.08), 0 2px 4px rgba(0,0,0,0.3);
    font-family: "Noto Serif SC", "Songti SC", serif;
  }
</style>
</head>
<body>
  <button class="btn-download" onclick="downloadCover()">⬇ 下载封面</button>
  <div class="combo">
    <div class="left">
      <div class="dots"></div>
      <div class="line-diag"></div>
      <div class="line-h"></div>
      <div class="tag-row">
        <span class="tag">分红险</span>
        <span class="tag">监管</span>
      </div>
      <div class="main-title">630倒计时<br>20天</div>
      <div class="sub-row">
        <div class="sub-dot"></div>
        <span class="subtitle">演示利率全面下调至3.5%</span>
      </div>
      <div class="info-line">银保关注 · 2026.06</div>
    </div>
    <div class="right">
      <div class="corner-accent"></div>
      <div class="dots-r"></div>
      <div class="title">630<br>倒计时<br>20天</div>
    </div>
  </div>
  <p style="margin-top:16px;font-size:13px;color:#755f49;font-family:'IBM Plex Mono',monospace;">
    editorial-kraft · 暖棕 · 适合生活/温暖/情感类内容
  </p>
  <script>
    function downloadCover() {
      var el = document.querySelector('.combo');
      html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false })
        .then(function(c) { var l = document.createElement('a'); l.download = '封面_kraft.png'; l.href = c.toDataURL('image/png'); l.click(); });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
