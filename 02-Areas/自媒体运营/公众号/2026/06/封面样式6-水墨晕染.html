<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面 - 水墨晕染</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #d5d8de; gap: 20px; }
  .combo { display: flex; }
  .btn-download { background: #1a1a1b; color: #FFF; border: none; padding: 10px 28px; border-radius: 0; cursor: pointer; font-size: 14px; font-family: "IBM Plex Mono", monospace; }
  .btn-download:hover { background: #333; }

  .left {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    background: #f3f0e8;
    display: flex; flex-direction: column; justify-content: center;
    padding: 48px 64px;
    border-right: 1px solid rgba(10,10,11,0.06);
  }
  /* 水墨晕染 - CSS 径向渐变模拟 */
  .ink-wash-1 {
    position: absolute;
    top: -60px; right: -40px;
    width: 500px; height: 400px;
    background: radial-gradient(circle at 60% 50%, rgba(10,10,11,0.04) 0%, transparent 60%);
    z-index: 1;
  }
  .ink-wash-2 {
    position: absolute;
    bottom: -80px; left: -60px;
    width: 400px; height: 350px;
    background: radial-gradient(circle at 40% 60%, rgba(10,10,11,0.03) 0%, transparent 55%);
    z-index: 1;
  }
  .ink-wash-3 {
    position: absolute;
    top: 50%; left: 30%;
    width: 300px; height: 300px;
    background: radial-gradient(circle at 50% 50%, rgba(49,93,147,0.03) 0%, transparent 50%);
    z-index: 1;
  }
  /* 纸张纹理 */
  .paper-grain {
    position: absolute;
    inset: 0;
    opacity: .25;
    background-image: radial-gradient(rgba(0,0,0,.04) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }
  .tag-row { display: flex; gap: 8px; margin-bottom: 18px; position: relative; z-index: 2; }
  .tag {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: .20em;
    text-transform: uppercase;
    color: rgba(10,10,11,0.45);
    background: rgba(10,10,11,0.04);
    padding: 4px 14px;
    border: 1px solid rgba(10,10,11,0.08);
  }
  .main-title {
    font-size: 76px; font-weight: 500; color: #0a0a0b;
    line-height: 1.06;
    position: relative; z-index: 2;
    font-family: "Noto Serif SC", "Songti SC", serif;
    letter-spacing: .04em;
  }
  .sub-row { margin-top: 10px; position: relative; z-index: 2; }
  .subtitle {
    font-size: 17px; color: rgba(10,10,11,0.45);
    letter-spacing: .20em;
    font-family: "IBM Plex Mono", monospace;
    text-transform: uppercase;
  }
  .info-line {
    position: absolute; bottom: 32px; left: 64px;
    font-size: 11px; color: rgba(10,10,11,0.25);
    letter-spacing: .15em; z-index: 2;
    font-family: "IBM Plex Mono", monospace;
  }
  /* 毛笔竖线装饰 */
  .brush-line {
    position: absolute;
    right: 48px; top: 48px; bottom: 48px;
    width: 2px;
    background: linear-gradient(180deg, transparent 0%, rgba(10,10,11,0.06) 30%, rgba(10,10,11,0.10) 60%, transparent 100%);
    z-index: 1;
  }

  .right {
    width: 383px; height: 383px; position: relative; overflow: hidden;
    background: #f3f0e8;
    display: flex; justify-content: center; align-items: center;
    padding: 36px;
  }
  .right .paper-grain-r {
    position: absolute; inset: 0;
    opacity: .25;
    background-image: radial-gradient(rgba(0,0,0,.04) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }
  .right .ink-wash-r {
    position: absolute;
    bottom: -40px; right: -40px;
    width: 300px; height: 300px;
    background: radial-gradient(circle at 50% 50%, rgba(10,10,11,0.04) 0%, transparent 60%);
    z-index: 1;
  }
  .right .title {
    font-size: 48px; font-weight: 500; color: #0a0a0b;
    text-align: center; line-height: 1.15;
    position: relative; z-index: 2;
    font-family: "Noto Serif SC", "Songti SC", serif;
    letter-spacing: .04em;
  }
  .right .seal {
    position: absolute;
    bottom: 28px; right: 32px;
    width: 36px; height: 36px;
    border: 2px solid rgba(10,10,11,0.08);
    border-radius: 4px;
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-family: "Noto Serif SC", serif;
    font-size: 14px;
    color: rgba(10,10,11,0.20);
  }
</style>
</head>
<body>
  <button class="btn-download" onclick="downloadCover()">⬇ 下载</button>
  <div class="combo">
    <div class="left">
      <div class="paper-grain"></div>
      <div class="ink-wash-1"></div>
      <div class="ink-wash-2"></div>
      <div class="ink-wash-3"></div>
      <div class="brush-line"></div>
      <div class="tag-row">
        <span class="tag">分红险</span>
        <span class="tag">监管</span>
      </div>
      <div class="main-title">630倒计时<br>20天</div>
      <div class="sub-row">
        <span class="subtitle">演示利率全面下调至3.5%</span>
      </div>
      <div class="info-line">银保关注 · 2026.06</div>
    </div>
    <div class="right">
      <div class="paper-grain-r"></div>
      <div class="ink-wash-r"></div>
      <div class="seal">保</div>
      <div class="title">630<br>倒计时<br>20天</div>
    </div>
  </div>
  <p style="margin-top:16px;font-size:12px;color:rgba(10,10,11,0.35);font-family:'IBM Plex Mono',monospace;">
    装饰：纸张纹理 + 水墨晕染 + 毛笔竖线 + 印章 · 暖纸底
  </p>
  <script>
    function downloadCover() {
      var el = document.querySelector('.combo');
      html2canvas(el, { scale: 2, backgroundColor: null, useCORS: true, logging: false })
        .then(function(c) { var l = document.createElement('a'); l.download = '封面_水墨晕染.png'; l.href = c.toDataURL('image/png'); l.click(); });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
