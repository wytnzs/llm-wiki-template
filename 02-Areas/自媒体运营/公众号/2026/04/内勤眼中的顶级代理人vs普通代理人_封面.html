<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0e0e0; }
.combo { display: flex; width: 1283px; height: 383px; }

.left {
  width: 900px; height: 383px;
  background: linear-gradient(135deg, #0A1931 0%, #102542 50%, #1A3A5C 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 60px;
}
.left::before {
  content: '';
  position: absolute;
  top: -60%; left: -30%;
  width: 80%; height: 200%;
  background: radial-gradient(ellipse, rgba(247,127,0,0.08) 0%, transparent 70%);
  transform: rotate(-15deg);
}
.left .main-title {
  font-size: 56px;
  font-weight: 900;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.3;
  position: relative;
  z-index: 1;
  letter-spacing: 2px;
}
.left .subtitle {
  font-size: 22px;
  color: rgba(255,255,255,0.55);
  margin-top: 16px;
  position: relative;
  z-index: 1;
  letter-spacing: 1px;
}
.left .tags {
  display: flex; gap: 12px; margin-top: 24px;
  position: relative; z-index: 1;
}
.left .tag {
  padding: 6px 18px;
  border: 1px solid rgba(247,127,0,0.5);
  border-radius: 20px;
  color: #F77F00;
  font-size: 15px;
  letter-spacing: 1px;
}

.right {
  width: 383px; height: 383px;
  background: linear-gradient(160deg, #102542 0%, #0F3A5C 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 36px;
  position: relative;
  overflow: hidden;
}
.right::before {
  content: '';
  position: absolute;
  bottom: -20%; right: -20%;
  width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(247,127,0,0.06) 0%, transparent 70%);
}
.right .title {
  font-size: 36px;
  font-weight: 800;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.5;
  position: relative;
  z-index: 1;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="combo">
  <div class="left">
    <div class="main-title">内勤眼中的<br>顶级代理人 vs 普通代理人</div>
    <div class="subtitle">五个分水岭，代理人自己从不知道</div>
    <div class="tags">
      <span class="tag">保险内勤视角</span>
      <span class="tag">代理人成长</span>
      <span class="tag">行业观察</span>
    </div>
  </div>
  <div class="right">
    <div class="title">内勤眼中的<br>顶级代理人<br>vs 普通代理人</div>
  </div>
</div>
</body>
</html>
