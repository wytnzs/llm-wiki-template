<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>测试 · 小红书 Swiss</title>
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root,[data-accent="ikb"]{--paper:#fafaf8;--ink:#0a0a0a;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;--accent:#002FA7;--accent-on:#ffffff}
    [data-accent="lemon-yellow"]{--paper:#fafaf8;--ink:#0a0a0a;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;--accent:#FFD500;--accent-on:#0a0a0a}
    [data-accent="lemon-green"]{--paper:#fafaf8;--ink:#0a0a0a;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;--accent:#C5E803;--accent-on:#0a0a0a}
    [data-accent="safety-orange"]{--paper:#fafaf8;--ink:#0a0a0a;--grey-1:#f0f0ee;--grey-2:#d4d4d2;--grey-3:#737373;--accent:#FF6B35;--accent-on:#ffffff}
    :root{--sans:"Inter","Helvetica Neue",Helvetica,"Noto Sans SC",-apple-system,"PingFang SC","Microsoft YaHei UI",sans-serif;--sans-zh:"Noto Sans SC",-apple-system,"PingFang SC","Microsoft YaHei UI","Inter",sans-serif;--mono:"IBM Plex Mono",ui-monospace,"SF Mono",Consolas,monospace;--sp-3:8px;--sp-4:12px;--sp-5:16px;--sp-6:24px;--sp-7:32px;--sp-8:40px;--sp-9:48px;--sp-10:64px;--sp-11:80px;--sp-12:96px;--sp-13:160px}
    *,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0}
    body{background:#1a1a1a;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;padding:70px 20px 40px;display:flex;flex-direction:column;align-items:center}
    .sheet{display:flex;flex-direction:column;align-items:center;gap:48px}
    .poster{position:relative;background:var(--paper);color:var(--ink);overflow:hidden;isolation:isolate;width:1080px;height:1440px;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.24)}
    .poster .content{position:relative;width:100%;height:100%;z-index:2;padding:var(--sp-12) var(--sp-11);display:flex;flex-direction:column}
    .h-statement{font-family:var(--sans);font-weight:200;font-size:124px;line-height:1.05;letter-spacing:-.015em;margin:0;color:var(--ink)}
    .h-md{font-family:var(--sans);font-weight:400;font-size:56px;line-height:1.18;margin:0;color:var(--ink)}
    .lead{font-family:var(--sans-zh);font-weight:400;font-size:30px;line-height:1.55;color:var(--ink);margin:0}
    .t-cat{font-family:var(--sans);font-weight:600;font-size:22px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0}
    .t-meta{font-family:var(--mono);font-weight:500;font-size:20px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-3);margin:0}
    .num-mega{font-family:var(--sans);font-weight:200;font-size:168px;line-height:.92;letter-spacing:-.03em;color:var(--ink);margin:0}
    .stack{display:flex;flex-direction:column}.gap-6{gap:var(--sp-6)}.gap-7{gap:var(--sp-7)}.gap-8{gap:var(--sp-8)}.gap-9{gap:var(--sp-9)}.grow{flex:1}.center{text-align:center}
    .chrome-min{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:18px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey-3);padding-bottom:var(--sp-6);border-bottom:1px solid var(--grey-2);margin-bottom:var(--sp-8)}
    .hr-accent{height:3px;background:var(--accent);border:0;width:96px;margin:0}
    .card-accent{background:var(--accent);color:var(--accent-on);padding:var(--sp-8)}
    .card-accent .lead,.card-accent .h-md,.card-accent .t-cat,.card-accent .t-meta{color:var(--accent-on)}
    .kpi-tower-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-9);align-items:end}
    .kpi-tower-row .tower-col{display:flex;flex-direction:column;gap:var(--sp-5);align-items:flex-start}
    .kpi-tower-row .tower-col .num{font-family:var(--sans);font-weight:200;font-size:112px;line-height:1;letter-spacing:-.02em;margin:0}
    .kpi-tower-row .tower-col .lbl{font-family:var(--mono);font-size:20px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey-3);margin:0}
    .kpi-tower-row .tower-col .bar-tower{width:100%;height:var(--h,180px);background:var(--accent);transform-origin:bottom}
    .toolbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(26,26,26,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;height:54px}
    .toolbar .btn{background:#fff;color:#1a1a1a;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;font-family:-apple-system,'PingFang SC',sans-serif}
    .toolbar .btn:hover{opacity:.85;transform:translateY(-1px)}
    .toolbar .btn.accent{background:#002FA7;color:#fff}
    .toolbar .progress{color:rgba(255,255,255,.35);font-size:12px;font-weight:500;min-width:120px;text-align:center;font-family:-apple-system,'PingFang SC',sans-serif}
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn accent" onclick="downloadAll()">⬇ 全部下载</button>
    <button class="btn" onclick="downloadOne()">下载当前</button>
    <span class="progress" id="progress"></span>
  </div>

  <main class="sheet">
    <!-- ===== 第 1 张 · 封面 (S01) ===== -->
    <section class="poster xhs" id="xhs-01">
      <div class="content stack gap-8">
        <div class="chrome-min">
          <span>Vol. 01 · Swiss</span>
          <span>2026.06</span>
        </div>
        <div class="stack gap-6">
          <p class="t-cat">封面 · Cover</p>
          <h1 class="h-statement">测试<br>瑞士风格</h1>
        </div>
        <div class="grow"></div>
        <hr class="hr-accent">
        <p class="lead">无衬线、精确、数据导向的视觉语言。</p>
        <div class="row" style="display:flex;gap:24px;">
          <p class="t-meta">小红书</p>
          <p class="t-meta">/ 测试作者</p>
        </div>
      </div>
    </section>

    <!-- ===== 第 2 张 · 数据页 (S09 KPI) ===== -->
    <section class="poster xhs" id="xhs-02">
      <div class="content stack gap-9">
        <p class="t-cat">DATA</p>
        <h2 class="h-md">核心数据</h2>
        <div class="kpi-tower-row">
          <div class="tower-col">
            <p class="num">87%</p>
            <p class="lbl">满意度</p>
            <div class="bar-tower" style="--h:240px"></div>
          </div>
          <div class="tower-col">
            <p class="num">3.2x</p>
            <p class="lbl">效率提升</p>
            <div class="bar-tower" style="--h:180px"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 第 3 张 · CTA ===== -->
    <section class="poster xhs" id="xhs-03">
      <div class="content stack gap-9 center" style="justify-content:center;">
        <hr class="hr-accent" style="margin:0 auto;">
        <p class="t-cat">CONTACT</p>
        <h2 class="h-md" style="color:var(--accent);">WYTCALL</h2>
        <p class="lead">备注「小红书」优先通过</p>
        <hr class="hr-accent" style="margin:0 auto;">
      </div>
    </section>
  </main>

  <script>if(window.lucide&&typeof window.lucide.createIcons==='function'){window.lucide.createIcons()}</script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script>
    (function(){'use strict';var W=1080,H=1440;
      function r(el){var a=el.style.borderRadius,b=el.style.boxShadow;el.style.borderRadius='0';el.style.boxShadow='none';return html2canvas(el,{scale:1,useCORS:true,backgroundColor:null,width:W,height:H,logging:false}).then(function(c){el.style.borderRadius=a;el.style.boxShadow=b;return c})}
      function b(c){return new Promise(function(r){c.toBlob(r,'image/png')})}
      window.downloadAll=function(){var p=document.querySelectorAll('.poster.xhs'),pr=document.getElementById('progress'),z=new JSZip(),q=Promise.resolve();p.forEach(function(e,i){q=q.then(function(){pr.textContent='渲染 '+(i+1)+'/'+p.length+'...';return r(e).then(function(c){return b(c).then(function(b){z.file('小红书-'+String(i+1).padStart(2,'0')+'.png',b)})})})});q.then(function(){pr.textContent='打包中...';return z.generateAsync({type:'blob'})}).then(function(b){saveAs(b,'小红书-全部.zip');pr.textContent=p.length+' 张已完成'})}
      window.downloadOne=function(){var p=document.querySelectorAll('.poster.xhs'),vc=window.innerHeight/2,idx=0,min=Infinity;p.forEach(function(e,i){var d=Math.abs(e.getBoundingClientRect().top+e.getBoundingClientRect().height/2-vc);if(d<min){min=d;idx=i}});r(p[idx]).then(function(c){return b(c)}).then(function(b){saveAs(b,'小红书-'+String(idx+1).padStart(2,'0')+'.png')})}
    })();
  </script>
</body>
</html>
