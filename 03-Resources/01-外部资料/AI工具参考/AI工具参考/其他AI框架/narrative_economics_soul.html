<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叙事经济学 · 灵魂图</title>
<style>
  :root {
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5a5a55;
    --color-text-tertiary: #9a9a92;
    --color-border-secondary: rgba(0,0,0,0.2);
    --font-sans: system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --color-text-primary: #e8e6de; --color-text-secondary: #a8a69e; --color-text-tertiary: #6a6a62; --color-border-secondary: rgba(255,255,255,0.2); }
    body { background: #1c1c1a; }
    .card { background: #252523; }
  }
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #f5f4f0; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
  .card { background: white; border-radius: 16px; padding: 24px; max-width: 720px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  svg text { font-family: var(--font-sans); }
  svg .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  svg .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  svg .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; }
  svg .c-gray .ts { fill: #444441; }
  svg .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; }
  svg .c-teal .ts, svg .c-teal .th { fill: #085041; }
  svg .c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; }
  svg .c-purple .ts, svg .c-purple .th { fill: #3C3489; }
  svg .c-red rect { fill: #FAEBE8; stroke: #8C2A1A; stroke-width: 0.5px; }
  svg .c-red .ts, svg .c-red .th { fill: #6B1E12; }
  @media (prefers-color-scheme: dark) {
    svg .c-gray rect { fill: #444441; stroke: #B4B2A9; } svg .c-gray .ts { fill: #D3D1C7; }
    svg .c-teal rect { fill: #085041; stroke: #5DCAA5; } svg .c-teal .ts, svg .c-teal .th { fill: #9FE1CB; }
    svg .c-purple rect { fill: #3C3489; stroke: #AFA9EC; } svg .c-purple .ts, svg .c-purple .th { fill: #CECBF6; }
    svg .c-red rect { fill: #6B1E12; stroke: #E07A68; } svg .c-red .ts, svg .c-red .th { fill: #F2BAB2; }
    svg .ts { fill: var(--color-text-secondary); } svg .th { fill: var(--color-text-primary); }
  }
</style>
</head>
<body><div class="card">
<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="60" y="20" width="560" height="88" rx="16" fill="none" stroke="#1A6B8A" stroke-width="1.5" stroke-dasharray="6 3"/>
<text class="th" x="340" y="48" text-anchor="middle" fill="#1A6B8A" font-size="14">经济危机到来之前，</text>
<text class="th" x="340" y="68" text-anchor="middle" fill="#1A6B8A" font-size="14">那些在人群中流行的故事，是预言还是病毒？</text>
<text class="ts" x="340" y="94" text-anchor="middle" fill="#1A6B8A" opacity="0.75">（故事不只是描述现实——它在制造现实）</text>

<text class="ts" x="340" y="136" text-anchor="middle" fill="var(--color-text-tertiary)">表面上，这是一本关于"媒体与市场"关系的经济学研究——</text>

<g class="c-gray"><rect x="44" y="150" width="175" height="52" rx="8"/>
<text class="ts" x="132" y="174" text-anchor="middle">历史叙事案例</text>
<text class="ts" x="132" y="190" text-anchor="middle" opacity="0.55">大萧条 / 比特币 / 节俭</text></g>
<g class="c-gray"><rect x="253" y="150" width="175" height="52" rx="8"/>
<text class="ts" x="340" y="174" text-anchor="middle">叙事传播规律</text>
<text class="ts" x="340" y="190" text-anchor="middle" opacity="0.55">病毒式扩散 / 变异</text></g>
<g class="c-gray"><rect x="462" y="150" width="175" height="52" rx="8"/>
<text class="ts" x="549" y="174" text-anchor="middle">对主流经济学的批评</text>
<text class="ts" x="549" y="190" text-anchor="middle" opacity="0.55">模型遗漏了故事变量</text></g>

<line x1="340" y1="202" x2="340" y2="244" fill="none" stroke="#1A6B8A" marker-end="url(#arrow)" stroke-width="1.5"/>
<text class="ts" x="368" y="230" fill="#1A6B8A">暗门</text>

<rect x="70" y="248" width="540" height="82" rx="12" fill="none" stroke="#1A6B8A" stroke-width="1.5"/>
<text class="th" x="340" y="274" text-anchor="middle" fill="#1A6B8A" font-size="14">这不是一本"舆论影响市场"的常识确认——</text>
<text class="th" x="340" y="296" text-anchor="middle" fill="#1A6B8A" font-size="14">而是对经济学因果链的根本性颠覆</text>
<text class="ts" x="340" y="326" text-anchor="middle" fill="#1A6B8A" opacity="0.8">希勒真正的主张：叙事不是经济事件的镜子，它是经济事件的原因之一</text>

<text class="ts" x="340" y="364" text-anchor="middle" fill="var(--color-text-tertiary)">书的三个核心断言，共同构成一个新的因果模型——</text>

<g class="c-teal"><rect x="44" y="378" width="183" height="88" rx="8"/>
<text class="th" x="136" y="402" text-anchor="middle">叙事像病毒传播</text>
<text class="ts" x="136" y="420" text-anchor="middle">有感染率 / 康复率</text>
<text class="ts" x="136" y="436" text-anchor="middle">故事的流行曲线</text>
<text class="ts" x="136" y="452" text-anchor="middle">与流行病数学同构</text></g>
<g class="c-purple"><rect x="249" y="378" width="183" height="88" rx="8"/>
<text class="th" x="340" y="402" text-anchor="middle">叙事改变行为</text>
<text class="ts" x="340" y="420" text-anchor="middle">"节俭美德"流行</text>
<text class="ts" x="340" y="436" text-anchor="middle">→人们推迟消费</text>
<text class="ts" x="340" y="452" text-anchor="middle">→衰退真实发生</text></g>
<g class="c-red"><rect x="454" y="378" width="183" height="88" rx="8"/>
<text class="th" x="545" y="402" text-anchor="middle">叙事难以预测</text>
<text class="ts" x="545" y="420" text-anchor="middle">哪个故事会爆发</text>
<text class="ts" x="545" y="436" text-anchor="middle">取决于突变与</text>
<text class="ts" x="545" y="452" text-anchor="middle">情绪土壤的耦合</text></g>

<line x1="136" y1="466" x2="290" y2="506" fill="none" stroke="#9F9A8A" marker-end="url(#arrow)" stroke-width="0.8"/>
<line x1="340" y1="466" x2="340" y2="506" fill="none" stroke="#9F9A8A" marker-end="url(#arrow)" stroke-width="0.8"/>
<line x1="545" y1="466" x2="392" y2="506" fill="none" stroke="#9F9A8A" marker-end="url(#arrow)" stroke-width="0.8"/>

<rect x="80" y="508" width="520" height="64" rx="12" fill="none" stroke="#1A6B8A" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.85"/>
<text class="th" x="340" y="533" text-anchor="middle" fill="#1A6B8A" font-size="13">书的秘密：它在把"集体信念"重新纳入经济学的因果模型</text>
<text class="ts" x="340" y="554" text-anchor="middle" fill="#1A6B8A" opacity="0.85">现实不只被数据驱动——它被"人们相信什么故事"驱动</text>

<rect x="80" y="592" width="520" height="66" rx="12" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.7"/>
<text class="th" x="340" y="616" text-anchor="middle" fill="#534AB7" font-size="13">书里最深的未解之题：</text>
<text class="ts" x="340" y="636" text-anchor="middle" fill="#534AB7" opacity="0.85">如果叙事影响经济，那关于经济的研究本身也是叙事</text>
<text class="ts" x="340" y="654" text-anchor="middle" fill="#534AB7" opacity="0.7">希勒这本书，也在改变它所研究的那个现实</text>

<rect x="80" y="676" width="520" height="16" rx="6" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.8"/>
<text class="th" x="340" y="688" text-anchor="middle" fill="var(--color-text-primary)" font-size="11">对话对象：那个想知道"大众情绪从哪里来、又往哪里去"的人</text>
</svg>
</div></body></html>
