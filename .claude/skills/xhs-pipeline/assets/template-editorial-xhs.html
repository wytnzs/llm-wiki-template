<!doctype html>
<html lang="zh-CN" data-theme="ink-classic">
<head>
  <meta charset="utf-8">
  <title>[必填] · 小红书 Social Card</title>
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <style>
    /* =========================================================
       Editorial Magazine × E-ink — 小红书 3:4 Card
       Adapted from guizang-social-card-skill
       ---------------------------------------------------------
       One board: .poster.xhs  1080×1440  (3:4 小红书轮播图)
       Download toolbar with html2canvas export.

       Theme via <html data-theme="…">:
         ink-classic | indigo-porcelain | forest-ink | kraft-paper | dune | midnight-ink

       Fill posters where marked <!-- POSTERS_HERE -->.
       Each poster carries one Layout Recipe (M01-M16) from
       references/layout-recipes.md.
       ========================================================= */

    /* ---------- 1. Theme tokens ---------- */
    :root,
    [data-theme="ink-classic"] {
      --paper:     #f3f0e8;
      --paper-2:   #ebe6da;
      --ink:       #0a0a0b;
      --muted:     #68625a;
      --line:      rgba(10,10,11,.22);
      --accent:    #111111;
      --accent-soft: #d8d2c6;
      --ink-rgb: 10,10,11;
      --paper-rgb: 243,240,232;
      --accent-rgb: 17,17,17;
    }
    [data-theme="indigo-porcelain"] {
      --paper:     #f2f4f5;
      --paper-2:   #e5ebef;
      --ink:       #0a1f3d;
      --muted:     #5f6d78;
      --line:      rgba(10,31,61,.20);
      --accent:    #315d93;
      --accent-soft: #d7e1ec;
      --ink-rgb: 10,31,61;
      --paper-rgb: 242,244,245;
      --accent-rgb: 49,93,147;
    }
    [data-theme="forest-ink"] {
      --paper:     #f5f1e8;
      --paper-2:   #e8dfcf;
      --ink:       #16251b;
      --muted:     #5d665d;
      --line:      rgba(22,37,27,.22);
      --accent:    #2e6b4f;
      --accent-soft: #d4dfd2;
      --ink-rgb: 22,37,27;
      --paper-rgb: 245,241,232;
      --accent-rgb: 46,107,79;
    }
    [data-theme="kraft-paper"] {
      --paper:     #eedfc7;
      --paper-2:   #dfc9a8;
      --ink:       #2a1e13;
      --muted:     #755f49;
      --line:      rgba(42,30,19,.24);
      --accent:    #9b5a2e;
      --accent-soft: #d5b58f;
      --ink-rgb: 42,30,19;
      --paper-rgb: 238,223,199;
      --accent-rgb: 155,90,46;
    }
    [data-theme="dune"] {
      --paper:     #f0e6d2;
      --paper-2:   #ded0b7;
      --ink:       #1f1a14;
      --muted:     #6f6557;
      --line:      rgba(31,26,20,.22);
      --accent:    #8f7650;
      --accent-soft: #d4c2a4;
      --ink-rgb: 31,26,20;
      --paper-rgb: 240,230,210;
      --accent-rgb: 143,118,80;
    }
    [data-theme="midnight-ink"] {
      --paper:     #0e0d0c;
      --paper-2:   #1a1714;
      --ink:       #ece2cf;
      --muted:     #9a8c75;
      --line:      rgba(236,226,207,.22);
      --accent:    #d4a04a;
      --accent-soft: #3a2a14;
      --ink-rgb: 236,226,207;
      --paper-rgb: 14,13,12;
      --accent-rgb: 212,160,74;
    }

    /* ---------- 2. Typography stack ---------- */
    :root {
      --serif-zh: "Noto Serif SC", "Songti SC", "STSong", serif;
      --serif-en: "Playfair Display", "Noto Serif SC", serif;
      --sans-zh: "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --sans-en: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }

    /* ---------- 3. Reset & sheet ---------- */
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans-zh);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 70px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ---------- 4. Poster board (fixed 1080×1440) ---------- */
    .poster {
      position: relative;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      isolation: isolate;
      width: 1080px;
      height: 1440px;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.24);
    }
    .poster figure { margin: 0; }
    .poster .content {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      padding: 96px 88px;
    }

    /* ---------- 5. Background layers ---------- */
    .mag-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: .35;
      mix-blend-mode: multiply;
      background-image: radial-gradient(rgba(0,0,0,.045) 1px, transparent 1px);
      background-size: 3px 3px;
    }
    .paper-wash {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(var(--ink-rgb),.02), rgba(var(--ink-rgb),.05) 60%, rgba(var(--ink-rgb),.08));
    }
    [data-theme="midnight-ink"] .grain {
      opacity: .26;
      mix-blend-mode: screen;
      background-image: radial-gradient(rgba(255,244,214,.10) 1px, transparent 1px);
    }
    [data-theme="midnight-ink"] .paper-wash {
      background:
        radial-gradient(80% 50% at 28% 16%, rgba(212,160,74,.12), transparent 64%),
        radial-gradient(70% 60% at 80% 86%, rgba(60,40,20,.20), transparent 72%),
        linear-gradient(180deg, rgba(236,226,207,.02), rgba(0,0,0,.32));
    }

    /* ---------- 6. Typography roles ---------- */
    .kicker {
      font-family: var(--mono);
      font-size: 21px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(var(--ink-rgb), .55);
      margin: 0 0 18px;
    }
    .h-display {
      font-family: var(--serif-zh);
      font-weight: 500;
      font-size: 124px;
      line-height: 1.06;
      letter-spacing: .04em;
      margin: 0 0 24px;
      color: var(--ink);
    }
    .h-xl {
      font-family: var(--serif-zh);
      font-weight: 500;
      font-size: 88px;
      line-height: 1.10;
      letter-spacing: .03em;
      margin: 0 0 24px;
      color: var(--ink);
    }
    .h-md {
      font-family: var(--serif-zh);
      font-weight: 500;
      font-size: 56px;
      line-height: 1.18;
      letter-spacing: .02em;
      margin: 0 0 18px;
      color: var(--ink);
    }
    .h-sub {
      font-family: var(--serif-en);
      font-style: italic;
      font-weight: 400;
      font-size: 36px;
      color: var(--muted);
      margin: 0 0 24px;
    }
    .lead {
      font-family: var(--serif-zh);
      font-weight: 400;
      font-size: 28px;
      line-height: 1.55;
      color: rgba(var(--ink-rgb), .82);
      margin: 0 0 24px;
    }
    .body {
      font-family: var(--serif-zh);
      font-weight: 400;
      font-size: 24px;
      line-height: 1.65;
      color: rgba(var(--ink-rgb), .80);
      margin: 0 0 18px;
    }
    .meta {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .20em;
      text-transform: uppercase;
      color: rgba(var(--ink-rgb), .55);
    }
    .label {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .20em;
      text-transform: uppercase;
      color: rgba(var(--ink-rgb), .55);
    }
    .pullquote {
      font-family: var(--serif-zh);
      font-style: italic;
      font-weight: 500;
      font-size: 64px;
      line-height: 1.28;
      color: var(--ink);
      margin: 0;
    }

    /* ---------- 7. Issue label + metadata ---------- */
    .issue-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .issue-row .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .issue-strip {
      position: absolute;
      left: 88px;
      right: 88px;
      bottom: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    .issue-strip span { white-space: nowrap; }

    /* ---------- 8. Layout primitives ---------- */
    .stack    { display: flex; flex-direction: column; }
    .gap-1    { gap: 12px; }
    .gap-2    { gap: 24px; }
    .gap-3    { gap: 36px; }
    .gap-4    { gap: 48px; }
    .gap-5    { gap: 64px; }
    .row      { display: flex; flex-direction: row; }
    .col-2    { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
    .col-3    { display: grid; grid-template-columns: repeat(3, 1fr); gap: 36px; }
    .col-2-7-5 { display: grid; grid-template-columns: 7fr 5fr; gap: 48px; }
    .col-2-8-4 { display: grid; grid-template-columns: 8fr 4fr; gap: 48px; }
    .center   { text-align: center; }
    .grow     { flex: 1; }
    .pad-y-md { padding-top: 36px; padding-bottom: 36px; }
    .rule     { height: 1px; background: var(--line); border: 0; margin: 24px 0; }
    .rule-accent { height: 2px; background: var(--accent); border: 0; margin: 24px 0; width: 96px; }

    /* ---------- 9. Image containers ---------- */
    .frame-img {
      position: relative;
      overflow: hidden;
      background: var(--paper-2);
      display: block;
      margin: 0;
    }
    .frame-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 50%;
      display: block;
    }
    .frame-img.fit-contain img { object-fit: contain; }
    [data-theme="midnight-ink"] .frame-img {
      background: #18120f;
      box-shadow: 0 0 0 1px rgba(236,226,207,.10);
    }
    .frame-img.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-img.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-img.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-img.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-img.r-16x10 { aspect-ratio: 16 / 10; }
    .frame-img.r-21x9  { aspect-ratio: 21 / 9; }
    .img-cap {
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 14px;
    }

    /* ---------- 9b. Screenshot treatment ---------- */
    .frame-shot {
      position: relative;
      overflow: hidden;
      display: block;
      margin: 0;
      background: var(--paper-2);
      border-radius: 6px;
    }
    .frame-shot.corners-sq { border-radius: 0; }
    .frame-shot.corners-sm { border-radius: 6px; }
    .frame-shot.corners-md { border-radius: 14px; }
    .frame-shot.shadow-soft { box-shadow: 0 18px 36px -18px rgba(20,18,14,.22), 0 2px 6px rgba(20,18,14,.06); }
    .frame-shot.shadow-ed   { box-shadow: 0 28px 60px -24px rgba(20,18,14,.32), 0 6px 14px rgba(20,18,14,.08); }
    .frame-shot.bg-paper    { background: var(--paper); }
    .frame-shot.bg-paper-2  { background: var(--paper-2); }
    .frame-shot.bg-ink      { background: var(--ink); }
    .frame-shot.bg-grid     {
      background:
        linear-gradient(var(--paper-2), var(--paper-2)),
        repeating-linear-gradient(0deg, var(--line) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 48px);
      background-blend-mode: multiply;
    }
    .frame-shot.bg-dot {
      background-color: var(--paper-2);
      background-image: radial-gradient(var(--line) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    .frame-shot.inset-none > img,
    .frame-shot.inset-none > .shot-body { padding: 0; }
    .frame-shot.inset-sub  { padding: 24px; }
    .frame-shot.inset-bal  { padding: 56px; }
    .frame-shot.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-shot.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-shot.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-shot.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-shot.r-21x9  { aspect-ratio: 21 / 9; }
    .frame-shot > img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: inherit;
    }
    .frame-shot.fit-cover > img { object-fit: cover; }
    .device-browser {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }
    .device-browser::before {
      content: '';
      display: block;
      height: 36px;
      background: var(--paper-2);
      border-bottom: 1px solid var(--line);
      background-image:
        radial-gradient(circle at 18px 18px, #f08080 5px, transparent 5.5px),
        radial-gradient(circle at 38px 18px, #f5c450 5px, transparent 5.5px),
        radial-gradient(circle at 58px 18px, #7ec98f 5px, transparent 5.5px);
    }
    .device-phone {
      position: relative;
      background: var(--ink);
      border-radius: 36px;
      padding: 14px;
      box-shadow: 0 24px 48px -20px rgba(20,18,14,.42);
    }

    /* ---------- 10. Editorial components ---------- */
    .callout {
      border-left: 3px solid var(--accent);
      padding: 18px 28px;
      font-family: var(--serif-zh);
      font-style: italic;
      font-size: 36px;
      line-height: 1.35;
      color: var(--ink);
      background: var(--paper-2);
    }
    .callout .callout-src {
      display: block;
      margin-top: 18px;
      font-style: normal;
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .12em;
      color: var(--muted);
    }
    .ledger { display: flex; flex-direction: column; }
    .ledger-row {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 24px;
      align-items: baseline;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }
    .ledger-row .ledger-nb {
      font-family: var(--mono);
      font-size: 28px;
      color: var(--accent);
      letter-spacing: .08em;
    }
    .ledger-row .ledger-title {
      font-family: var(--serif-zh);
      font-weight: 500;
      font-size: 42px;
      letter-spacing: .02em;
      color: var(--ink);
    }
    .ledger-row .ledger-note {
      font-family: var(--serif-zh);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.55;
      color: rgba(var(--ink-rgb), .72);
    }
    .marginalia {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 48px;
    }
    .marginalia .mg-col {
      border-left: 1px solid var(--line);
      padding-left: 24px;
    }
    .marginalia .mg-col p {
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .04em;
      color: var(--muted);
      margin: 0 0 16px;
    }
    .pipeline-v { display: flex; flex-direction: column; gap: 28px; }
    .pipeline-v .step {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 28px;
      align-items: baseline;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .pipeline-v .step:last-child { border-bottom: 0; }
    .pipeline-v .step-nb {
      font-family: var(--mono);
      font-size: 32px;
      color: var(--accent);
    }
    .pipeline-v .step-title {
      font-family: var(--serif-zh);
      font-weight: 500;
      font-size: 40px;
      letter-spacing: .02em;
      margin: 0 0 8px;
    }
    .pipeline-v .step-desc {
      font-family: var(--serif-zh);
      font-weight: 400;
      font-size: 24px;
      line-height: 1.6;
      color: rgba(var(--ink-rgb), .72);
      margin: 0;
    }
    .beforeafter {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 32px;
      height: 100%;
    }
    .beforeafter .ba-block {
      padding: 32px;
      background: var(--paper-2);
      border-left: 3px solid var(--accent);
    }
    .beforeafter .ba-block.before { opacity: .68; }

    /* ---------- 11. Corner metadata ---------- */
    .poster .corner-tl,
    .poster .corner-tr,
    .poster .corner-bl,
    .poster .corner-br {
      position: absolute;
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 3;
    }
    .poster .corner-tl { left: 88px; top: 56px; }
    .poster .corner-tr { right: 88px; top: 56px; }
    .poster .corner-bl { left: 88px; bottom: 56px; }
    .poster .corner-br { right: 88px; bottom: 56px; }

    /* ---------- 12. Download toolbar ---------- */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(26,26,26,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 54px;
    }
    .toolbar .btn {
      background: #fff;
      color: #1a1a1a;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .3px;
      font-family: -apple-system, 'PingFang SC', sans-serif;
    }
    .toolbar .btn:hover {
      opacity: .85;
      transform: translateY(-1px);
    }
    .toolbar .btn.accent {
      background: #d4a04a;
      color: #fff;
    }
    .toolbar .progress {
      color: rgba(255,255,255,.35);
      font-size: 12px;
      font-weight: 500;
      min-width: 120px;
      text-align: center;
      font-family: -apple-system, 'PingFang SC', sans-serif;
    }
  </style>
</head>
<body>

  <!-- ========== TOOLBAR ========== -->
  <div class="toolbar" id="toolbar">
    <button class="btn accent" onclick="downloadAll()">⬇ 全部下载</button>
    <button class="btn" onclick="downloadOne()">下载当前</button>
    <span class="progress" id="progress"></span>
  </div>

  <!-- ========== POSTER SHEET ========== -->
  <main class="sheet">

    <!-- POSTERS_HERE -->
    <!--
      替换以下占位符为真实内容。
      每个 .poster 使用一个 Layout Recipe（M01-M16）。

      <section class="poster xhs" id="xhs-01">
        <canvas class="mag-bg" data-bg="ink-flow"></canvas>
        <div class="grain"></div>
        <div class="content stack gap-4">
          ... content using Editorial components ...
        </div>
        <div class="issue-strip">
          <span>Issue · Magazine</span>
          <span>—</span>
          <span>by [作者]</span>
        </div>
      </section>
    -->

    <!-- ========== 占位 · M01 封面 ========== -->
    <section class="poster xhs" id="xhs-01">
      <canvas class="mag-bg" data-bg="ink-flow"></canvas>
      <div class="grain"></div>
      <div class="content stack gap-4">
        <div class="issue-row">
          <span>Vol. 01</span><span class="dot"></span><span>2026.06</span>
        </div>
        <div class="stack gap-2">
          <p class="kicker">封面 · Cover</p>
          <h1 class="h-display">[标题占位]<br>替换为真实文案</h1>
          <p class="h-sub">副标题</p>
        </div>
        <figure class="frame-img r-16x10">
          <img src="" alt="cover image placeholder">
        </figure>
        <p class="lead">引语。</p>
      </div>
      <div class="issue-strip">
        <span>小红书</span>
        <span>—</span>
        <span>by [作者]</span>
      </div>
    </section>

  </main>

  <!-- ========== SCRIPTS ========== -->
  <!-- Magazine WebGL background -->
  <script>
    /* magazine-bg-webgl.js — 简化版 ink-flow 背景 */
    (function() {
      'use strict';
      if (window.MagazineBg) return;
      var MB = {};
      function cssVarRgb(name, fallback) {
        var raw = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        if (!raw) return fallback;
        var parts = raw.split(',').map(function(x) { return parseInt(x.trim(), 10); });
        return parts.length === 3 && parts.every(function(n) { return !isNaN(n); }) ? parts : fallback;
      }
      MB.mount = function(canvas, opts) {
        opts = opts || {};
        var ctx = canvas.getContext('2d');
        var w = canvas.parentElement ? canvas.parentElement.offsetWidth : 1080;
        var h = canvas.parentElement ? canvas.parentElement.offsetHeight : 1440;
        canvas.width = w;
        canvas.height = h;
        var ink = opts.ink || [10,10,11];
        var paper = opts.paper || [243,240,232];
        var strength = opts.strength || 0.32;
        // Gradient wash — deterministic, no randomness
        var grd = ctx.createLinearGradient(0, 0, w*0.6, h*0.8);
        grd.addColorStop(0, 'rgba(' + ink.join(',') + ',' + (strength * 0.15) + ')');
        grd.addColorStop(0.5, 'rgba(' + ink.join(',') + ',' + (strength * 0.08) + ')');
        grd.addColorStop(1, 'rgba(' + paper.join(',') + ',0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);
        // Subtle flow lines
        ctx.globalAlpha = strength * 0.06;
        ctx.strokeStyle = 'rgb(' + ink.join(',') + ')';
        ctx.lineWidth = 1.5;
        for (var i = 0; i < 8; i++) {
          var x = w * 0.1 + (w * 0.8 * i / 7);
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.quadraticCurveTo(x + w*0.05, h*0.4, x - w*0.03, h);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      };
      window.MagazineBg = MB;
      // Auto-mount after load
      function mountAll() {
        var ink = cssVarRgb('--ink-rgb', [10,10,11]);
        var paper = cssVarRgb('--paper-rgb', [243,240,232]);
        var accent = cssVarRgb('--accent-rgb', [17,17,17]);
        document.querySelectorAll('canvas.mag-bg').forEach(function(c) {
          MB.mount(c, { ink: ink, paper: paper, accent: accent, strength: 0.32 });
        });
      }
      if (document.readyState === 'complete') mountAll();
      else window.addEventListener('load', mountAll);
    })();
  </script>

  <!-- html2canvas + JSZip + FileSaver -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script>
    (function() {
      'use strict';
      var W = 1080, H = 1440;

      function renderPoster(el) {
        // Temporarily remove border-radius for clean export
        var origBr = el.style.borderRadius;
        var origBs = el.style.boxShadow;
        el.style.borderRadius = '0';
        el.style.boxShadow = 'none';
        return html2canvas(el, {
          scale: 1,
          useCORS: true,
          backgroundColor: null,
          width: W,
          height: H,
          logging: false
        }).then(function(canvas) {
          el.style.borderRadius = origBr;
          el.style.boxShadow = origBs;
          return canvas;
        });
      }

      function canvasToBlob(canvas) {
        return new Promise(function(resolve) {
          canvas.toBlob(resolve, 'image/png');
        });
      }

      window.downloadAll = function() {
        var posters = document.querySelectorAll('.poster.xhs');
        var progress = document.getElementById('progress');
        var zip = new JSZip();
        var p = Promise.resolve();
        posters.forEach(function(el, i) {
          p = p.then(function() {
            progress.textContent = '渲染 ' + (i+1) + '/' + posters.length + '...';
            return renderPoster(el).then(function(canvas) {
              return canvasToBlob(canvas).then(function(blob) {
                zip.file('小红书-' + String(i+1).padStart(2,'0') + '.png', blob);
              });
            });
          });
        });
        p.then(function() {
          progress.textContent = '打包中...';
          return zip.generateAsync({ type: 'blob' });
        }).then(function(blob) {
          saveAs(blob, '小红书-全部.zip');
          progress.textContent = posters.length + ' 张已完成';
        });
      };

      window.downloadOne = function() {
        var posters = document.querySelectorAll('.poster.xhs');
        var vc = window.innerHeight / 2;
        var idx = 0, min = Infinity;
        posters.forEach(function(el, i) {
          var rect = el.getBoundingClientRect();
          var d = Math.abs(rect.top + rect.height/2 - vc);
          if (d < min) { min = d; idx = i; }
        });
        renderPoster(posters[idx]).then(function(canvas) {
          return canvasToBlob(canvas);
        }).then(function(blob) {
          saveAs(blob, '小红书-' + String(idx+1).padStart(2,'0') + '.png');
        });
      };
    })();
  </script>
</body>
