<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>[必填] · 小红书 Social Card</title>
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* =========================================================
       Swiss International — 小红书 3:4 Card
       Adapted from guizang-social-card-skill
       ---------------------------------------------------------
       One board: .poster.xhs  1080×1440  (3:4 小红书轮播图)
       Download toolbar with html2canvas export.

       Accent via <html data-accent="…">:
         ikb | lemon-yellow | lemon-green | safety-orange
       ========================================================= */

    /* ---------- 1. Accent palettes ---------- */
    :root,
    [data-accent="ikb"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #002FA7;
      --accent-on: #ffffff;
    }
    [data-accent="lemon-yellow"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #FFD500;
      --accent-on: #0a0a0a;
    }
    [data-accent="lemon-green"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #C5E803;
      --accent-on: #0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #FF6B35;
      --accent-on: #ffffff;
    }

    /* ---------- 2. Typography stack ---------- */
    :root {
      --sans:    "Inter", "Helvetica Neue", Helvetica, "Noto Sans SC",
                 -apple-system, "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --sans-zh: "Noto Sans SC", -apple-system, "PingFang SC",
                 "Microsoft YaHei UI", "Inter", sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }

    /* ---------- 3. Spacing tokens ---------- */
    :root {
      --sp-3:   8px;
      --sp-4:  12px;
      --sp-5:  16px;
      --sp-6:  24px;
      --sp-7:  32px;
      --sp-8:  40px;
      --sp-9:  48px;
      --sp-10: 64px;
      --sp-11: 80px;
      --sp-12: 96px;
      --sp-13: 160px;
    }

    /* ---------- 4. Reset & sheet ---------- */
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 70px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ---------- 5. Poster board (fixed 1080×1440) ---------- */
    .poster {
      position: relative;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      isolation: isolate;
      width: 1080px;
      height: 1440px;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.24);
    }
    .poster figure { margin: 0; }
    .poster .content {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
      padding: var(--sp-12) var(--sp-11);
      display: flex;
      flex-direction: column;
    }

    /* ---------- 5b. Decorative mats ---------- */
    .dot-mat,
    .ring-mat,
    .cross-mat {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .dot-mat {
      opacity: .08;
      background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
    .ring-mat {
      opacity: .08;
      background-image: radial-gradient(circle at 50% 50%, transparent 4px, var(--ink) 4.5px, var(--ink) 5px, transparent 5.5px);
      background-size: 32px 32px;
    }
    .cross-mat {
      opacity: .06;
      background-image:
        linear-gradient(var(--ink), var(--ink)),
        linear-gradient(90deg, var(--ink), var(--ink));
      background-size: 1px 14px, 14px 1px;
      background-position: center, center;
      background-repeat: repeat;
    }

    /* ---------- 6. Typography ---------- */
    .h-hero {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 168px;
      line-height: 1.02;
      letter-spacing: -.02em;
      margin: 0;
      color: var(--ink);
    }
    .h-statement {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 124px;
      line-height: 1.05;
      letter-spacing: -.015em;
      margin: 0;
      color: var(--ink);
    }
    .h-xl {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 96px;
      line-height: 1.08;
      letter-spacing: -.01em;
      margin: 0;
      color: var(--ink);
    }
    .h-md {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 56px;
      line-height: 1.18;
      margin: 0;
      color: var(--ink);
    }
    .lead {
      font-family: var(--sans-zh);
      font-weight: 400;
      font-size: 30px;
      line-height: 1.55;
      color: var(--ink);
      margin: 0;
    }
    .body {
      font-family: var(--sans-zh);
      font-weight: 400;
      font-size: 26px;
      line-height: 1.6;
      color: var(--ink);
      margin: 0;
    }
    .t-cat {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }
    .t-meta {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 20px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin: 0;
    }
    .num-mega {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 168px;
      line-height: .92;
      letter-spacing: -.03em;
      color: var(--ink);
      margin: 0;
    }
    .num-xl {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 120px;
      line-height: .96;
      letter-spacing: -.02em;
      margin: 0;
    }
    .mono { font-family: var(--mono); }

    /* ---------- 7. Layout primitives ---------- */
    .stack    { display: flex; flex-direction: column; }
    .row      { display: flex; flex-direction: row; }
    .gap-3    { gap: var(--sp-3); }
    .gap-4    { gap: var(--sp-4); }
    .gap-5    { gap: var(--sp-5); }
    .gap-6    { gap: var(--sp-6); }
    .gap-7    { gap: var(--sp-7); }
    .gap-8    { gap: var(--sp-8); }
    .gap-9    { gap: var(--sp-9); }
    .gap-10   { gap: var(--sp-10); }
    .grow     { flex: 1; }
    .grid-12  { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--sp-7); }
    .grid-2-9 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-9); }
    .grid-3   { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-7); }
    .grid-4   { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-6); }
    .span-2   { grid-column: span 2; }
    .span-3   { grid-column: span 3; }
    .span-4   { grid-column: span 4; }
    .span-6   { grid-column: span 6; }
    .span-8   { grid-column: span 8; }
    .span-9   { grid-column: span 9; }
    .span-12  { grid-column: span 12; }
    .center   { text-align: center; }
    .right    { text-align: right; }
    .uppercase{ text-transform: uppercase; }
    .hr-hairline {
      height: 1px;
      background: var(--grey-2);
      border: 0;
      margin: 0;
    }
    .hr-accent {
      height: 3px;
      background: var(--accent);
      border: 0;
      width: 96px;
      margin: 0;
    }

    /* ---------- 8. Card fills ---------- */
    .card-ink {
      background: var(--ink);
      color: var(--paper);
      padding: var(--sp-8);
    }
    .card-ink .t-cat,
    .card-ink .t-meta,
    .card-ink .lead,
    .card-ink .body,
    .card-ink .h-md { color: var(--paper); }
    .card-accent {
      background: var(--accent);
      color: var(--accent-on);
      padding: var(--sp-8);
    }
    .card-accent .t-cat,
    .card-accent .t-meta,
    .card-accent .lead,
    .card-accent .body,
    .card-accent .h-md { color: var(--accent-on); }
    .card-fill {
      background: var(--grey-1);
      color: var(--ink);
      padding: var(--sp-8);
    }
    .card-outlined {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--grey-2);
      padding: var(--sp-8);
    }

    /* ---------- 9. Image containers ---------- */
    .frame-img {
      position: relative;
      overflow: hidden;
      background: var(--grey-1);
      display: block;
      margin: 0;
    }
    .frame-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      display: block;
    }
    .frame-img.fit-contain img { object-fit: contain; background: var(--paper); }
    .frame-img.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-img.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-img.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-img.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-img.r-16x10 { aspect-ratio: 16 / 10; }
    .frame-img.r-21x9  { aspect-ratio: 21 / 9; }
    .frame-img.r-3x2   { aspect-ratio: 3 / 2; }
    .swiss-img-caption {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 18px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin-top: var(--sp-5);
    }

    /* ---------- 9b. Screenshot treatment ---------- */
    .frame-shot {
      position: relative;
      overflow: hidden;
      display: block;
      margin: 0;
      background: var(--grey-1);
      border-radius: 0;
    }
    .frame-shot.corners-sq { border-radius: 0; }
    .frame-shot.corners-sm { border-radius: 4px; }
    .frame-shot.corners-md { border-radius: 10px; }
    .frame-shot.shadow-soft { box-shadow: 0 12px 28px -16px rgba(0,0,0,.18); }
    .frame-shot.shadow-ed   { box-shadow: 0 20px 40px -20px rgba(0,0,0,.22), 0 0 0 1px var(--grey-2); }
    .frame-shot.bg-paper    { background: var(--paper); }
    .frame-shot.bg-grey-1   { background: var(--grey-1); }
    .frame-shot.bg-ink      { background: var(--ink); }
    .frame-shot.bg-grid     {
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grey-2) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grey-2) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .frame-shot.bg-dot {
      background-color: var(--paper);
      background-image: radial-gradient(var(--grey-2) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    .frame-shot.inset-none > img,
    .frame-shot.inset-none > .shot-body { padding: 0; }
    .frame-shot.inset-sub  { padding: 20px; }
    .frame-shot.inset-bal  { padding: 48px; }
    .frame-shot.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-shot.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-shot.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-shot.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-shot.r-21x9  { aspect-ratio: 21 / 9; }
    .frame-shot > img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: inherit;
    }
    .frame-shot.fit-cover > img { object-fit: cover; }
    .device-browser {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--grey-2);
      border-radius: 6px;
      overflow: hidden;
    }
    .device-browser::before {
      content: '';
      display: block;
      height: 32px;
      background: var(--grey-1);
      border-bottom: 1px solid var(--grey-2);
      background-image:
        radial-gradient(circle at 16px 16px, var(--grey-3) 4px, transparent 4.5px),
        radial-gradient(circle at 34px 16px, var(--grey-3) 4px, transparent 4.5px),
        radial-gradient(circle at 52px 16px, var(--grey-3) 4px, transparent 4.5px);
    }
    .device-phone {
      position: relative;
      background: var(--ink);
      border-radius: 28px;
      padding: 12px;
      box-shadow: 0 16px 36px -18px rgba(0,0,0,.32);
    }

    /* ---------- 10. Swiss-specific components ---------- */

    /* KPI Tower */
    .kpi-tower-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-9);
      align-items: end;
    }
    .kpi-tower-row .tower-col {
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
      align-items: flex-start;
    }
    .kpi-tower-row .tower-col .num {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 112px;
      line-height: 1;
      letter-spacing: -.02em;
      margin: 0;
    }
    .kpi-tower-row .tower-col .lbl {
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin: 0;
    }
    .kpi-tower-row .tower-col .bar-tower {
      width: 100%;
      height: var(--h, 180px);
      background: var(--accent);
      transform-origin: bottom;
    }
    .kpi-tower-row .tower-col.muted .bar-tower {
      background: var(--grey-2);
    }

    /* H-Bar Chart */
    .h-bar-chart {
      display: grid;
      gap: var(--sp-6);
    }
    .h-bar-chart .bar-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--sp-4);
    }
    .h-bar-chart .bar-row .row-lbl {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 26px;
      color: var(--ink);
    }
    .h-bar-chart .bar-row .row-track {
      position: relative;
      height: 28px;
      background: var(--grey-1);
    }
    .h-bar-chart .bar-row .row-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--w, 50%);
      background: var(--accent);
    }
    .h-bar-chart .bar-row .row-val {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 22px;
      letter-spacing: .04em;
      color: var(--ink);
      margin-top: 4px;
    }

    /* Stacked Ledger */
    .stacked-ledger {
      display: flex;
      flex-direction: column;
    }
    .stacked-ledger .ledger-row {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: var(--sp-6);
      align-items: baseline;
      padding: var(--sp-6) 0;
      border-bottom: 1px solid var(--grey-2);
    }
    .stacked-ledger .ledger-row:first-child { padding-top: 0; }
    .stacked-ledger .ledger-row:last-child  { border-bottom: 0; }
    .stacked-ledger .ledger-num {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 88px;
      line-height: 1;
      letter-spacing: -.02em;
      margin: 0;
    }
    .stacked-ledger .ledger-lbl {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 28px;
      line-height: 1.3;
      color: var(--ink);
    }
    .stacked-ledger .ledger-lbl .sub {
      display: block;
      font-weight: 400;
      font-size: 20px;
      color: var(--grey-3);
      margin-top: var(--sp-3);
    }
    .stacked-ledger .ledger-icn {
      width: 48px;
      height: 48px;
      color: var(--accent);
    }

    /* Matrix Fill */
    .matrix-fill {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: min-content;
      gap: var(--sp-4);
    }
    .matrix-fill .matrix-cell {
      background: var(--grey-1);
      padding: var(--sp-5);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }
    .matrix-fill .matrix-cell .cell-nb {
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: .10em;
      color: var(--grey-3);
    }
    .matrix-fill .matrix-cell .cell-title {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 24px;
      line-height: 1.3;
      color: var(--ink);
    }
    .matrix-fill .matrix-cell.is-accent {
      background: var(--accent);
      color: var(--accent-on);
    }
    .matrix-fill .matrix-cell.is-accent .cell-nb,
    .matrix-fill .matrix-cell.is-accent .cell-title { color: var(--accent-on); }
    .hero-stat-bottom {
      margin-top: var(--sp-6);
      padding-top: var(--sp-5);
      border-top: 1px solid var(--grey-2);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--sp-7);
    }
    .hero-stat-bottom .num-mega { font-size: 128px; line-height: 1; }

    /* Chrome-min (top metadata) */
    .chrome-min {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--grey-3);
      padding-bottom: var(--sp-6);
      border-bottom: 1px solid var(--grey-2);
      margin-bottom: var(--sp-8);
    }

    /* ---------- 11. Download toolbar ---------- */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(26,26,26,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 54px;
    }
    .toolbar .btn {
      background: #fff;
      color: #1a1a1a;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .3px;
      font-family: -apple-system, 'PingFang SC', sans-serif;
    }
    .toolbar .btn:hover {
      opacity: .85;
      transform: translateY(-1px);
    }
    .toolbar .btn.accent {
      background: #002FA7;
      color: #fff;
    }
    .toolbar .progress {
      color: rgba(255,255,255,.35);
      font-size: 12px;
      font-weight: 500;
      min-width: 120px;
      text-align: center;
      font-family: -apple-system, 'PingFang SC', sans-serif;
    }
  </style>
</head>
<body>

  <!-- ========== TOOLBAR ========== -->
  <div class="toolbar" id="toolbar">
    <button class="btn accent" onclick="downloadAll()">⬇ 全部下载</button>
    <button class="btn" onclick="downloadOne()">下载当前</button>
    <span class="progress" id="progress"></span>
  </div>

  <!-- ========== POSTER SHEET ========== -->
  <main class="sheet">

    <!-- POSTERS_HERE -->
    <!--
      替换以下占位符为真实内容。
      每个 .poster 使用一个 Layout Recipe（S01-S12）。

      <section class="poster xhs" id="xhs-01">
        <div class="content stack gap-8">
          ... content using Swiss components ...
        </div>
      </section>
    -->

    <!-- ========== 占位 · S01 封面 ========== -->
    <section class="poster xhs" id="xhs-01">
      <div class="content stack gap-8">
        <div class="chrome-min">
          <span>Vol. 01 · Swiss</span>
          <span>2026.06</span>
        </div>
        <div class="stack gap-6">
          <p class="t-cat">封面 · Cover</p>
          <h1 class="h-statement">[标题占位]<br>替换为真实文案</h1>
        </div>
        <div class="grow"></div>
        <hr class="hr-accent">
        <p class="lead">引语。</p>
        <div class="row gap-6">
          <p class="t-meta">小红书</p>
          <p class="t-meta">/ [作者]</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ========== SCRIPTS ========== -->
  <!-- Lucide icon initialization -->
  <script>
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  </script>

  <!-- html2canvas + JSZip + FileSaver -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script>
    (function() {
      'use strict';
      var W = 1080, H = 1440;

      function renderPoster(el) {
        var origBr = el.style.borderRadius;
        var origBs = el.style.boxShadow;
        el.style.borderRadius = '0';
        el.style.boxShadow = 'none';
        return html2canvas(el, {
          scale: 1,
          useCORS: true,
          backgroundColor: null,
          width: W,
          height: H,
          logging: false
        }).then(function(canvas) {
          el.style.borderRadius = origBr;
          el.style.boxShadow = origBs;
          return canvas;
        });
      }

      function canvasToBlob(canvas) {
        return new Promise(function(resolve) {
          canvas.toBlob(resolve, 'image/png');
        });
      }

      window.downloadAll = function() {
        var posters = document.querySelectorAll('.poster.xhs');
        var progress = document.getElementById('progress');
        var zip = new JSZip();
        var p = Promise.resolve();
        posters.forEach(function(el, i) {
          p = p.then(function() {
            progress.textContent = '渲染 ' + (i+1) + '/' + posters.length + '...';
            return renderPoster(el).then(function(canvas) {
              return canvasToBlob(canvas).then(function(blob) {
                zip.file('小红书-' + String(i+1).padStart(2,'0') + '.png', blob);
              });
            });
          });
        });
        p.then(function() {
          progress.textContent = '打包中...';
          return zip.generateAsync({ type: 'blob' });
        }).then(function(blob) {
          saveAs(blob, '小红书-全部.zip');
          progress.textContent = posters.length + ' 张已完成';
        });
      };

      window.downloadOne = function() {
        var posters = document.querySelectorAll('.poster.xhs');
        var vc = window.innerHeight / 2;
        var idx = 0, min = Infinity;
        posters.forEach(function(el, i) {
          var rect = el.getBoundingClientRect();
          var d = Math.abs(rect.top + rect.height/2 - vc);
          if (d < min) { min = d; idx = i; }
        });
        renderPoster(posters[idx]).then(function(canvas) {
          return canvasToBlob(canvas);
        }).then(function(blob) {
          saveAs(blob, '小红书-' + String(idx+1).padStart(2,'0') + '.png');
        });
      };
    })();
  </script>
</body>
</html>
